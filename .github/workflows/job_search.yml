name: AI Job Referral Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  job-search:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies (with forced cleanup)
      run: |
        python -m pip install --upgrade pip
        pip uninstall -y anthropic httpx || true
        pip install --no-cache-dir anthropic==0.39.0
        pip install --no-cache-dir httpx==0.27.2
        pip install --no-cache-dir -r requirements.txt
    
    - name: Verify versions
      run: |
        echo "Checking installed versions..."
        pip show anthropic | grep Version
        pip show httpx | grep Version
    
    - name: Install Chrome and ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
    
    - name: Run job search agent
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        python job_referral_agent.py
    
    - name: Upload logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: |
          *.log
          **/*.log
```

**Key changes**:
1. `pip uninstall -y anthropic httpx || true` → Force remove old versions
2. Install `anthropic==0.39.0` explicitly first
3. Install `httpx==0.27.2` explicitly second
4. Added "Verify versions" step to show what's actually installed

---

## 📋 Step-by-Step: Update the Workflow

1. **Go to `.github/workflows/job_search.yml`**
2. **Click the pencil icon ✏️**
3. **Delete all content**
4. **Paste the workflow above**
5. **Commit changes**: "Force uninstall old anthropic version"
6. **Go to Actions tab**
7. **Run workflow**
8. **Check the "Verify versions" step** - should show:
```
   Version: 0.39.0  (for anthropic)
   Version: 0.27.2  (for httpx)
```

